name: Cat Toy Patent Scraper

on:
  schedule:
    - cron: '0 0 * * 1' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout repo)
        uses: actions/checkout@v4

      - name: 设置 Python (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖 (Install dependencies)
        run: pip install -r requirements.txt

      - name: 运行猫玩具抓取与 AI 分析 (Run scraper)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraper.py

      - name: 提交生成的网页文件到仓库 (Commit changes)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _posts/ || true
          git commit -m "Auto-update: 新增最新猫玩具专利摘要" || echo "今天没有新专利，无需更新"
          git push
